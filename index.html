<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAFE' 卡啡 咖啡豆訂購單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0EB;--card:#FFF;--ink:#2C2420;--ink-light:#6B5E54;--ink-faint:#A89888;--accent:#C4853C;--accent-dark:#A06A28;--accent-glow:#E8A84C;--green:#5A8C5A;--green-light:#E8F5E8;--red:#C25040;--border:#DDD4CA;--shadow:rgba(44,36,32,.08);--seven:#E95504;--seven-bg:#FFF6F0;--seven-border:#FDDCC8}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
.hero{position:relative;background:linear-gradient(135deg,#2C2420,#4A3728 50%,#3D2E22);padding:48px 24px 40px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(196,133,60,.15),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(196,133,60,.1),transparent 50%)}
.hero *{position:relative}.hero-badge{display:inline-block;font-size:11px;letter-spacing:3px;color:var(--accent-glow);border:1px solid rgba(196,133,60,.4);padding:4px 16px;border-radius:20px;margin-bottom:16px}
.hero h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#F5F0EB;margin-bottom:6px}.hero h1 span{color:var(--accent-glow)}
.hero-sub{font-size:14px;color:rgba(245,240,235,.6);font-weight:300;letter-spacing:1px}
.container{max-width:520px;margin:0 auto;padding:0 16px 120px}
.section-label{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);margin:28px 0 12px}
.cat-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);font-size:14px;font-weight:600;color:var(--ink-light);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.cat-tab small{font-size:11px;font-weight:400;opacity:.7}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-tab.active small{opacity:.9}
.cat-tab.has-qty{border-color:var(--accent);color:var(--accent)}
.cat-tab.has-qty.active{color:#fff}
.product-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px var(--shadow);display:flex;align-items:center;gap:14px;animation:fadeUp .4s ease both}
.product-card.has-qty{box-shadow:0 0 0 2px var(--accent),0 2px 12px rgba(196,133,60,.15)}
.product-card:nth-child(2){animation-delay:.05s}.product-card:nth-child(3){animation-delay:.1s}.product-card:nth-child(4){animation-delay:.15s}
.product-card:nth-child(5){animation-delay:.2s}.product-card:nth-child(6){animation-delay:.25s}.product-card:nth-child(7){animation-delay:.3s}
.product-info{flex:1;min-width:0}.product-name{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:2px}
.product-origin{font-size:12px;color:var(--ink-light);margin-bottom:2px}.product-flavor{display:flex;flex-wrap:wrap;gap:4px}
.flavor-tag{background:#F0EBE5;border-radius:4px;padding:1px 6px;font-size:11px;white-space:nowrap;color:var(--ink-faint)}
.product-price{font-size:18px;font-weight:900;color:var(--accent-dark);white-space:nowrap}.product-price small{font-size:11px;font-weight:400;color:var(--ink-faint)}
.product-right{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0}
.qty-stepper{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.qty-btn{width:36px;height:36px;border:none;background:transparent;font-size:20px;font-weight:500;color:var(--ink-light);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.qty-btn:active{background:var(--bg)}.qty-btn:disabled{opacity:.25;cursor:default}
.qty-val{width:36px;text-align:center;font-size:16px;font-weight:700;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);line-height:36px}
.qty-val.active{color:var(--accent-dark)}.product-card.oos{opacity:.45;pointer-events:none}
.oos-badge{font-size:10px;font-weight:700;color:var(--red);background:rgba(194,80,64,.08);padding:2px 8px;border-radius:6px}
.summary-bar{position:fixed;bottom:0;left:0;right:0;background:#2C2420;color:#F5F0EB;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.2);transition:transform .3s}
.summary-bar.hidden{transform:translateY(100%)}
.summary-inner{max-width:520px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.summary-text{font-size:13px;line-height:1.5}.summary-text strong{font-size:20px;color:var(--accent-glow)}
.summary-text .free-ship{color:#7CBA7C;font-size:11px;font-weight:700}.summary-text .ship-cost{font-size:11px;color:rgba(245,240,235,.5)}
.btn-checkout{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
.btn-checkout:active{background:var(--accent-dark)}
.form-section{background:var(--card);border-radius:14px;padding:20px 16px;margin-top:10px;box-shadow:0 1px 4px var(--shadow)}
.form-group{margin-bottom:14px}.form-group:last-child{margin-bottom:0}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--ink-light);margin-bottom:4px}.form-group label .req{color:var(--red)}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:#FAFAF8;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--accent)}.form-input::placeholder{color:var(--ink-faint)}
.seven-section{background:var(--seven-bg);border:1.5px solid var(--seven-border);border-radius:14px;padding:20px 16px;margin-top:10px;box-shadow:0 1px 4px var(--shadow)}
.seven-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.seven-logo{width:42px;height:42px;background:var(--seven);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;font-family:'Playfair Display',serif;flex-shrink:0}
.seven-title{font-size:16px;font-weight:700}.seven-subtitle{font-size:12px;color:var(--ink-faint)}
.seven-section .form-input{background:#fff}.seven-section .form-input:focus{border-color:var(--seven)}
.store-selected{display:none;align-items:center;gap:8px;padding:10px 14px;background:var(--green-light);border:1.5px solid #B5D8B5;border-radius:10px;margin-bottom:14px;font-size:14px;font-weight:500;color:var(--green)}
.store-selected.show{display:flex}
.store-selected .check{width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--seven-border);border-top:none;border-radius:0 0 10px 10px;max-height:240px;overflow-y:auto;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ac-list.open{display:block}
.ac-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #F5F0EB}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:#FFF6F0}
.ac-item-name{font-size:14px;font-weight:700;color:var(--ink)}
.ac-item-name mark{background:rgba(233,85,4,.15);color:var(--seven);font-weight:900;border-radius:2px;padding:0 1px}
.ac-item-addr{font-size:12px;color:var(--ink-faint);margin-top:1px}
.ac-item-area{font-size:11px;color:var(--seven);font-weight:500}
.ac-count{padding:8px 14px;font-size:11px;color:var(--ink-faint);text-align:center;border-bottom:1px solid #F5F0EB}
.info-banner{background:linear-gradient(135deg,rgba(196,133,60,.08),rgba(196,133,60,.04));border:1px solid rgba(196,133,60,.2);border-radius:12px;padding:14px 16px;margin-top:20px;font-size:13px;color:var(--ink-light);line-height:1.7}
.info-banner strong{color:var(--accent-dark)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:24px 20px 36px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:900;margin-bottom:16px;text-align:center}
.order-line{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #F0EBE5}
.order-line:last-of-type{border-bottom:none}.order-line .ol-name{flex:1}.order-line .ol-detail{color:var(--ink-light);white-space:nowrap;margin-left:12px}
.order-total{display:flex;justify-content:space-between;padding:14px 0 0;margin-top:8px;border-top:2px solid var(--ink);font-size:18px;font-weight:900}
.order-total .ot-val{color:var(--accent-dark)}
.order-ship-info{text-align:center;font-size:12px;color:var(--ink-faint);margin:6px 0 16px}
.order-recipient{background:#F8F5F0;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--ink-light);line-height:1.8}
.btn-submit{width:100%;padding:14px;background:var(--seven);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-bottom:8px;-webkit-tap-highlight-color:transparent;transition:all .2s}
.btn-submit:active{opacity:.85}
.btn-submit:disabled{background:var(--ink-faint);cursor:wait}
.btn-submit.success{background:var(--green)}
.btn-submit.error{background:var(--red)}
.btn-copy-sm{width:100%;padding:10px;background:transparent;color:var(--ink-faint);border:1.5px solid var(--border);border-radius:12px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent;margin-bottom:8px}
.btn-copy-sm.copied{border-color:var(--green);color:var(--green)}
.btn-close-modal{width:100%;padding:10px;background:transparent;color:var(--ink-faint);border:none;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;text-decoration:underline}
.footer{text-align:center;padding:24px 16px 8px;font-size:11px;color:var(--ink-faint)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">自家烘焙 ・ 精品咖啡</div>
  <h1>KAFE' <span>卡啡</span></h1>
  <div class="hero-sub">咖啡豆訂購單 ☕ 7-11 超商取貨</div>
</div>

<div class="container">
  <div class="info-banner">
    🏷️ 官網限定 <strong>95 折</strong>｜運費 <strong>$38</strong><br>
    🎉 滿 <strong>$1,000</strong> 免運費！｜🏪 7-ELEVEN 門市取貨
  </div>

  <div class="section-label">☕ 選擇咖啡豆</div>
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" data-cat="beans">精品豆<small>100g</small></button>
    <button class="cat-tab" data-cat="special">特選豆單<small>半磅</small></button>
    <button class="cat-tab" data-cat="family">家庭號<small>1500g</small></button>
  </div>
  <div id="product-list"></div>

  <div class="section-label">🏪 取貨門市</div>
  <div class="seven-section">
    <div class="seven-header">
      <div class="seven-logo">7</div>
      <div>
        <div class="seven-title">7-ELEVEN 門市取貨</div>
        <div class="seven-subtitle" id="store-count-label">輸入關鍵字搜尋門市</div>
      </div>
    </div>
    <div class="store-selected" id="store-selected">
      <span class="check">✓</span>
      <span id="store-display"></span>
    </div>
    <div class="form-group">
      <label>搜尋門市 <span class="req">*</span></label>
      <div class="ac-wrap">
        <input class="form-input" type="text" id="inp-store-search"
               placeholder="輸入門市名稱、地址或地區" autocomplete="off"
               oninput="onSearch()" onfocus="onSearch()">
        <div class="ac-list" id="ac-list"></div>
      </div>
    </div>
    <div class="form-group" id="store-addr-row" style="display:none">
      <label>已選門市地址</label>
      <input class="form-input" type="text" id="inp-store-addr" readonly style="background:#F5F0EB;color:var(--ink-light)">
    </div>
    <input type="hidden" id="inp-store" value="">
    <input type="hidden" id="inp-store-code" value="">
  </div>

  <div class="section-label">📬 收件人資訊</div>
  <div class="form-section">
    <div class="form-group">
      <label>收件者姓名 <span class="req">*</span></label>
      <input class="form-input" type="text" id="inp-name" placeholder="王小明">
    </div>
    <div class="form-group">
      <label>手機號碼 <span class="req">*</span></label>
      <input class="form-input" type="tel" id="inp-phone" placeholder="0912345678" maxlength="10" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>Email <small style="color:var(--ink-faint)">(收出貨通知)</small></label>
      <input class="form-input" type="email" id="inp-email" placeholder="example@gmail.com" inputmode="email">
    </div>
    <div class="form-group">
      <label>備註</label>
      <input class="form-input" type="text" id="inp-note" placeholder="特殊需求可填寫於此">
    </div>
  </div>
  <div class="footer">KAFE' 卡啡 — 自家烘焙精品咖啡<br>7-ELEVEN 超商取貨</div>
</div>

<!-- Summary Bar -->
<div class="summary-bar hidden" id="summary-bar">
  <div class="summary-inner">
    <div class="summary-text"><span id="sum-packs">0</span> 包｜<strong>$<span id="sum-total">0</span></strong><br><span id="sum-ship"></span></div>
    <button class="btn-checkout" onclick="handleCheckout()">確認訂單</button>
  </div>
</div>

<!-- Order Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">📋 訂單確認</div>
    <div id="modal-body"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitOrder()">🛒 送出訂單</button>
    <button class="btn-copy-sm" id="btn-copy" onclick="copyOrder()">📋 複製訂單文字</button>
    <button class="btn-close-modal" onclick="document.getElementById('modal').classList.remove('show')">返回修改</button>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="modal-success" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal-sheet" style="text-align:center;padding-top:40px">
    <div style="font-size:64px;margin-bottom:16px">🎉</div>
    <div style="font-size:22px;font-weight:900;margin-bottom:8px">訂單已送出！</div>
    <div style="font-size:14px;color:var(--ink-light);margin-bottom:24px;line-height:1.6">
      我們已收到您的訂單<br>會盡快為您準備並寄出<br>感謝您選擇 KAFE' 卡啡 ☕
    </div>
    <div style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--ink)">卡啡社群歡迎你來聊天</div>
      <img src="QrCode.jpg" alt="加入群組 QR Code" style="width:140px;height:140px;border-radius:8px">
    </div>
    <button class="btn-submit" style="background:var(--green)" onclick="location.reload()">✓ 完成</button>
  </div>
</div>

const SHIP=38,FREE=1000,DISC=0.95,Q={};
let curCat='beans',stockLoaded=false;
P.forEach(p=>Q[p.id]=0);

// ── 即時庫存：從 Google Sheets 讀取 ──
fetch(GAS_URL+'?action=stock').then(r=>r.json()).then(stockMap=>{
  let changed=false;

function switchCat(cat){
  curCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.cat===cat);
  });
  render();
}
document.getElementById('cat-tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.cat-tab');
  if(tab)switchCat(tab.dataset.cat);
});

function render(){
  const fp=P.filter(p=>p.category===curCat&&(p.stock>0||Q[p.id]>0));
  document.getElementById('product-list').innerHTML=fp.map(p=>{
    const has=Q[p.id]>0;
    return`<div class="product-card ${has?'has-qty':''}">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-origin">${p.origin}｜${p.roast}</div>
        <div class="product-flavor">${p.flavors.map(f=>`<span class="flavor-tag">${f}</span>`).join('')}</div>
      </div>
      <div class="product-right">
        <div class="product-price">$${p.price}<small>/${p.unit}</small></div>
        <div class="qty-stepper">
          <button class="qty-btn" onclick="chg('${p.id}',-1)" ${Q[p.id]<=0?'disabled':''}>−</button>
          <div class="qty-val ${Q[p.id]>0?'active':''}">${Q[p.id]}</div>
          <button class="qty-btn" onclick="chg('${p.id}',1)" ${Q[p.id]>=p.stock?'disabled':''}>+</button>
        </div>
      </div></div>`;
  }).join('')||'<div style="text-align:center;padding:20px;color:var(--ink-light)">此分類暫無商品</div>';
  // highlight tabs that have items in cart, hide empty categories
  document.querySelectorAll('.cat-tab').forEach(t=>{
    const cat=t.dataset.cat;
    const hasItems=P.some(p=>p.category===cat&&Q[p.id]>0);
    const hasStock=P.some(p=>p.category===cat&&p.stock>0);
    t.classList.toggle('has-qty',hasItems&&cat!==curCat);
    t.style.display=hasStock||hasItems?'':'none';
  });
  updateBar();
}
function chg(id,d){const p=P.find(x=>x.id===id);Q[id]=Math.max(0,Math.min(p.stock,Q[id]+d));render();}
function updateBar(){
  let pk=0,am=0;P.forEach(p=>{pk+=Q[p.id];am+=Q[p.id]*p.price});
  const dam=Math.floor(am*DISC),fr=am>=FREE,tot=dam+(fr||!am?0:SHIP);
  document.getElementById('sum-packs').textContent=pk;
  document.getElementById('sum-total').textContent=tot.toLocaleString();
  const s=document.getElementById('sum-ship');
  if(!am)s.innerHTML='';else if(fr)s.innerHTML='<span class="free-ship">95折 $'+dam.toLocaleString()+' ✓ 免運</span>';
  else s.innerHTML=`<span class="ship-cost">95折 $${dam.toLocaleString()}＋運費 $${SHIP}｜再 $${FREE-am} 免運</span>`;
  document.getElementById('summary-bar').classList.toggle('hidden',!pk);
}

// ── Autocomplete ──
let acIdx=-1;
function onSearch(){
  const raw=document.getElementById('inp-store-search').value.trim();
  const list=document.getElementById('ac-list');
  if(raw.length<1){list.classList.remove('open');return;}
  const terms=raw.toLowerCase().split(/\s+/);
  const res=[];
  for(let i=0;i<STORES.length&&res.length<50;i++){
    const s=STORES[i],hay=(s[0]+s[1]+s[2]).toLowerCase();
    if(terms.every(t=>hay.includes(t)))res.push(i);
  }
  if(!res.length){list.innerHTML='<div class="ac-count">找不到符合的門市</div>';list.classList.add('open');return;}
  let h=`<div class="ac-count">找到 ${res.length} 間${res.length>=50?' (前50筆)':''}</div>`;
  res.forEach((si,idx)=>{const s=STORES[si];
    h+=`<div class="ac-item" onclick="pick(${si})" onmouseenter="acIdx=${idx}">
      <div class="ac-item-name">${hl(s[0],terms)} <span class="ac-item-area">${s[2]}</span></div>
      <div class="ac-item-addr">${hl(s[1],terms)}</div></div>`;
  });
  list.innerHTML=h;list.classList.add('open');acIdx=-1;
}
function hl(t,terms){let r=t;terms.forEach(w=>{if(!w)return;r=r.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);});return r;}
function pick(i){
  const s=STORES[i];
  document.getElementById('inp-store').value=s[0];
  document.getElementById('inp-store-code').value=s[3]||'';
  document.getElementById('inp-store-search').value=s[0];
  document.getElementById('inp-store-addr').value=s[1];
  document.getElementById('store-addr-row').style.display='';
  document.getElementById('store-display').textContent='7-ELEVEN '+s[0]+'（'+s[2]+'）';
  document.getElementById('store-selected').classList.add('show');
  document.getElementById('ac-list').classList.remove('open');
}
document.getElementById('inp-store-search').addEventListener('keydown',e=>{
  const items=document.getElementById('ac-list').querySelectorAll('.ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);mka(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);mka(items);}
  else if(e.key==='Enter'&&acIdx>=0){e.preventDefault();items[acIdx].click();}
});
function mka(items){items.forEach((el,i)=>{el.classList.toggle('active',i===acIdx);if(i===acIdx)el.scrollIntoView({block:'nearest'});});}
document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))document.getElementById('ac-list').classList.remove('open');});

// ── Checkout ──
let orderData=null;
function handleCheckout(){
  const name=document.getElementById('inp-name').value.trim();
  const phone=document.getElementById('inp-phone').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  const store=document.getElementById('inp-store').value.trim();
  const storeCode=document.getElementById('inp-store-code').value.trim();
  const addr=document.getElementById('inp-store-addr').value.trim();
  const note=document.getElementById('inp-note').value.trim();
  let pk=0;P.forEach(p=>pk+=Q[p.id]);
  if(!pk){alert('請至少選擇一款咖啡豆');return;}
  if(!store){alert('請搜尋並選擇 7-11 取貨門市');return;}
  if(!name){alert('請填寫收件者姓名');return;}
  if(!phone||!/^09\d{8}$/.test(phone)){alert('請填寫正確手機號碼（09開頭10碼）');return;}

  let packs=0,subtotal=0;const items=[];
  P.forEach(p=>{if(Q[p.id]>0){items.push({n:p.name,q:Q[p.id],s:Q[p.id]*p.price,u:p.unit});packs+=Q[p.id];subtotal+=Q[p.id]*p.price;}});
  const discounted=Math.floor(subtotal*DISC),saved=subtotal-discounted;
  const fr=subtotal>=FREE,ship=fr?0:SHIP,total=discounted+ship;

  orderData={name,phone,email,store,storeCode,storeAddr:addr,note,packs,subtotal:discounted,shipping:ship,total,
    items:items.map(i=>`${i.n}(${i.u})×${i.q}`).join('、'),
    cartItems:P.filter(p=>Q[p.id]>0).map(p=>({id:p.id,qty:Q[p.id]}))};

  let h='';
  items.forEach(i=>h+=`<div class="order-line"><span class="ol-name">${i.n}(${i.u}) × ${i.q}</span><span class="ol-detail">$${i.s.toLocaleString()}</span></div>`);
  h+=`<div class="order-line"><span class="ol-name">官網 95 折</span><span class="ol-detail" style="color:var(--green)">−$${saved.toLocaleString()}</span></div>`;
  h+=`<div class="order-line"><span class="ol-name">運費</span><span class="ol-detail">${fr?'免運費 🎉':'$'+SHIP}</span></div>`;
  h+=`<div class="order-total"><span>合計 ${packs} 包</span><span class="ot-val">$${total.toLocaleString()}</span></div>`;
  h+=`<div class="order-ship-info">${fr?'已達免運門檻':'差 $'+(FREE-subtotal)+' 即享免運'}</div>`;
  h+=`<div class="order-recipient">🏪 7-ELEVEN ${store}${addr?'<br>📍 '+addr:''}<br>👤 ${name}<br>📱 ${phone}${note?'<br>📝 '+note:''}</div>`;

  document.getElementById('modal-body').innerHTML=h;
  const btn=document.getElementById('btn-submit');btn.disabled=false;btn.className='btn-submit';btn.innerHTML='🛒 送出訂單';
  const cp=document.getElementById('btn-copy');cp.className='btn-copy-sm';cp.textContent='📋 複製訂單文字';
  document.getElementById('modal').classList.add('show');

  // Build copy text
  let t='【KAFE\' 卡啡 訂單】\n━━━━━━━━━━━━━━\n';
  items.forEach(i=>t+=`${i.n}(${i.u}) × ${i.q}　$${i.s.toLocaleString()}\n`);
  t+='━━━━━━━━━━━━━━\n';
  t+=`官網 95 折：−$${saved.toLocaleString()}\n運費：${fr?'免運費':'$'+SHIP}\n合計：${packs} 包　$${total.toLocaleString()}\n━━━━━━━━━━━━━━\n`;
  t+=`取貨門市：7-ELEVEN ${store}\n`;if(addr)t+=`門市地址：${addr}\n`;
  t+=`收件者：${name}\n手機：${phone}\n`;if(note)t+=`備註：${note}\n`;
  window._ot=t;
}

async function submitOrder(){
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>訂單送出中...';

  try{
    const resp=await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(orderData)});
    // no-cors always returns opaque response, so we assume success
    btn.className='btn-submit success';btn.innerHTML='✅ 訂單已送出！';
    setTimeout(()=>{
      document.getElementById('modal').classList.remove('show');
      document.getElementById('modal-success').classList.add('show');
    },800);
  }catch(err){
    btn.className='btn-submit error';btn.innerHTML='❌ 送出失敗，請複製訂單文字聯繫店家';
    btn.disabled=false;
    console.error(err);
  }
}

function copyOrder(){
  const t=window._ot;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('btn-copy');b.textContent='✅ 已複製';b.classList.add('copied');
  }).catch(()=>{
    const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);
    const b=document.getElementById('btn-copy');b.textContent='✅ 已複製';b.classList.add('copied');
  });
}

render();
</script>
