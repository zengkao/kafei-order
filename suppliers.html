<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0EB;--card:#FFF;--ink:#2C2420;--ink-light:#6B5E54;--ink-faint:#A89888;--accent:#C4853C;--accent-dark:#A06A28;--accent-glow:#E8A84C;--green:#5A8C5A;--border:#DDD4CA;--shadow:rgba(44,36,32,.08)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}

/* Hero */
.hero{position:relative;background:linear-gradient(135deg,#2C2420,#4A3728 50%,#3D2E22);padding:48px 24px 40px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(196,133,60,.15),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(196,133,60,.1),transparent 50%)}
.hero *{position:relative}
.hero-badge{display:inline-block;font-size:11px;letter-spacing:3px;color:var(--accent-glow);border:1px solid rgba(196,133,60,.4);padding:4px 16px;border-radius:20px;margin-bottom:16px}
.hero h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#F5F0EB;margin-bottom:6px}.hero h1 span{color:var(--accent-glow)}
.hero-sub{font-size:14px;color:rgba(245,240,235,.6);font-weight:300;letter-spacing:1px}
.back-link{display:inline-block;margin-top:16px;font-size:13px;color:var(--accent-glow);text-decoration:none;border:1px solid rgba(196,133,60,.4);padding:6px 18px;border-radius:20px;transition:all .2s}
.back-link:hover{background:rgba(196,133,60,.15)}

/* Container */
.container{max-width:600px;margin:0 auto;padding:0 16px 60px}

/* Section Labels */
.section-label{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);margin:32px 0 14px;text-transform:uppercase}

/* Supplier Cards */
.supplier-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.supplier-card{background:var(--card);border-radius:14px;padding:18px 16px;box-shadow:0 1px 4px var(--shadow);text-decoration:none;color:var(--ink);transition:all .2s;text-align:center;animation:fadeUp .4s ease both}
.supplier-card:nth-child(2){animation-delay:.03s}
.supplier-card:nth-child(3){animation-delay:.06s}
.supplier-card:nth-child(4){animation-delay:.09s}
.supplier-card:nth-child(5){animation-delay:.12s}
.supplier-card:nth-child(6){animation-delay:.15s}
.supplier-card:nth-child(7){animation-delay:.18s}
.supplier-card:nth-child(8){animation-delay:.21s}
.supplier-card:nth-child(9){animation-delay:.24s}
.supplier-card:nth-child(10){animation-delay:.27s}
.supplier-card:hover{box-shadow:0 4px 16px var(--shadow);transform:translateY(-2px)}
.supplier-icon{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#F5E6D0,#EDDCC4);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px}
.supplier-name{font-size:15px;font-weight:700;margin-bottom:4px}
.supplier-link{font-size:11px;color:var(--accent-dark);font-weight:500}

/* Footer */
.footer{text-align:center;padding:24px 16px 8px;font-size:11px;color:var(--ink-faint)}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:360px){
  .supplier-grid{grid-template-columns:1fr 1fr;gap:8px}
  .supplier-card{padding:14px 10px}
  .supplier-name{font-size:13px}
}
</style>
</head>
